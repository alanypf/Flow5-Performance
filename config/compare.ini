; Defaults for compare_logs.py (CLI arguments always win).
; Paths are relative to the directory you run from (normally Flow5-Performance/);
; bare filenames are resolved against config/ via config_paths.find_config.
[compare]
real = ../Ardu_Log/out
sitl = latest
sitl_logs_dir = ~/ardupilot/logs
sdf = model-aero-VITERNA-m.sdf
prop = ../ardupilot_gazebo/models/waterdrop/propellers/PER3_7x11E.csv
motor = motor.xml
battery = battery.xml
outdir = plots/compare
